name: Build and Release AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install AppImage runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Build GTK AppImage
        run: npm run dist:gtk

      - name: Show release files
        run: ls -lh release/

      - name: Upload AppImage to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "release/Interval Timer GTK-*-x86_64.AppImage"
          generate_release_notes: true
