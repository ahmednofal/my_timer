name: Build and Release AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install AppImage runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Build GTK AppImage
        run: npm run dist:gtk

      - name: Show release files
        run: ls -lh release/

      - name: Create distributable archive (preserves +x)
        run: |
          APPIMAGE_PATH=$(ls release/Interval\ Timer\ GTK-*-x86_64.AppImage | head -n 1)
          APPIMAGE_FILE=$(basename "$APPIMAGE_PATH")
          tar -C release -czf "release/${APPIMAGE_FILE}.tar.gz" "$APPIMAGE_FILE"
          sha256sum "release/${APPIMAGE_FILE}.tar.gz" > release/SHA256SUMS.txt
          ls -lh release/

      - name: Remove raw AppImage assets from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --json assets -q '.assets[].name' \
            | grep -E '\.AppImage$' \
            | while read -r asset; do
                gh release delete-asset "$GITHUB_REF_NAME" "$asset" --yes
              done || true

      - name: Upload AppImage to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Interval Timer GTK-*-x86_64.AppImage.tar.gz
            release/SHA256SUMS.txt
          generate_release_notes: true
